services:
  openclaw-jarvis:
    build:
      context: .
      args:
        - CUDA_VERSION=${CUDA_VERSION}
        - CUDA_ARCH=${CUDA_ARCH}
        - VERSION=${VERSION}
    image: openclaw-drillson:${VERSION}-cu${CUDA_VERSION}-ar${CUDA_ARCH}
    container_name: openclaw-jarvis
    restart: unless-stopped
    user: root
    volumes:
      - /data0/opt/claw/jarvis:/root
      - /data0/opt/claw/shared:/persist
      - /etc/localtime:/etc/localtime:ro
    dns:
      - "10.91.0.69"
      - "1.0.0.1"
    ports:
      - "18789:18789"
      - "18793:18793"
    environment:
      - TZ=Asia/Shanghai
    devices:
      - nvidia.com/gpu=all
